<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff" opacity="0.9"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e" opacity="0.9"/>
    </marker>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="860" height="340" fill="url(#bg2)" rx="12"/>
  <rect width="860" height="340" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <text x="430" y="28" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">dbt Model Lineage</text>
  <text x="430" y="46" text-anchor="middle" fill="#7d8590" font-size="10">raw source → staging view → mart tables</text>
  <line x1="40" y1="56" x2="820" y2="56" stroke="#21262d" stroke-width="1"/>

  <!-- Layer labels -->
  <text x="100" y="78" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="600" letter-spacing="1">SOURCE</text>
  <text x="310" y="78" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="600" letter-spacing="1">STAGING</text>
  <text x="600" y="78" text-anchor="middle" fill="#f0883e" font-size="9" font-weight="600" letter-spacing="1">MARTS</text>

  <!-- Vertical lane dividers -->
  <line x1="200" y1="62" x2="200" y2="320" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="420" y1="62" x2="420" y2="320" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ── SOURCE NODE ──────────────────────── -->
  <rect x="30" y="130" width="140" height="80" rx="8" fill="#0a1f14" stroke="#1b4332" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <text x="100" y="153" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">raw.price_snapshots</text>
  <text x="100" y="169" text-anchor="middle" fill="#7d8590" font-size="8.5">source()</text>
  <text x="100" y="183" text-anchor="middle" fill="#6e7681" font-size="8">append-only · DuckDB</text>
  <text x="100" y="197" text-anchor="middle" fill="#6e7681" font-size="8">+ PostgreSQL (CI)</text>

  <!-- source → stg arrow -->
  <path d="M170,170 C200,170 210,170 230,170" stroke="#4a9eff" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>

  <!-- ── STAGING NODE ─────────────────────── -->
  <rect x="230" y="128" width="168" height="84" rx="8" fill="#0d1b2e" stroke="#264f78" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <text x="314" y="151" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">stg_prices</text>
  <text x="314" y="167" text-anchor="middle" fill="#7d8590" font-size="8.5">view · staging schema</text>
  <text x="314" y="182" text-anchor="middle" fill="#6e7681" font-size="8">null filter, trim, price_tier</text>
  <text x="314" y="196" text-anchor="middle" fill="#6e7681" font-size="8">snapshot_date, snapshot_hour</text>

  <!-- stg → mart fan-out arrows -->
  <path d="M398,145 C415,145 428,110 448,110" stroke="#f0883e" stroke-width="1.2" fill="none" marker-end="url(#arr3)"/>
  <path d="M398,160 C415,160 428,168 448,168" stroke="#f0883e" stroke-width="1.2" fill="none" marker-end="url(#arr3)"/>
  <path d="M398,175 C415,175 428,225 448,225" stroke="#f0883e" stroke-width="1.2" fill="none" marker-end="url(#arr3)"/>
  <path d="M398,190 C415,190 428,285 448,285" stroke="#ffa657" stroke-width="1.5" fill="none" marker-end="url(#arr3)" stroke-dasharray="5,2"/>

  <!-- ── MART NODES ───────────────────────── -->
  <!-- price_history -->
  <rect x="448" y="82" width="172" height="72" rx="8" fill="#1a0e00" stroke="#5c3a1e" stroke-width="1.5"/>
  <text x="534" y="103" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="700">price_history</text>
  <text x="534" y="119" text-anchor="middle" fill="#7d8590" font-size="8.5">table · marts schema</text>
  <text x="534" y="133" text-anchor="middle" fill="#6e7681" font-size="8">LAG() · price_direction</text>
  <text x="534" y="147" text-anchor="middle" fill="#6e7681" font-size="8">price_change_abs / pct</text>

  <!-- price_movers -->
  <rect x="448" y="140" width="172" height="72" rx="8" fill="#1a0e00" stroke="#5c3a1e" stroke-width="1.5"/>
  <text x="534" y="161" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="700">price_movers</text>
  <text x="534" y="177" text-anchor="middle" fill="#7d8590" font-size="8.5">table · daily grain</text>
  <text x="534" y="191" text-anchor="middle" fill="#6e7681" font-size="8">RANK() · top-20 / day</text>
  <text x="534" y="205" text-anchor="middle" fill="#6e7681" font-size="8">drops + spikes</text>

  <!-- category_summary -->
  <rect x="448" y="198" width="172" height="72" rx="8" fill="#1a0e00" stroke="#5c3a1e" stroke-width="1.5"/>
  <text x="534" y="219" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="700">category_summary</text>
  <text x="534" y="235" text-anchor="middle" fill="#7d8590" font-size="8.5">table · category grain</text>
  <text x="534" y="249" text-anchor="middle" fill="#6e7681" font-size="8">avg · {{ median() }} macro</text>
  <text x="534" y="263" text-anchor="middle" fill="#6e7681" font-size="8">DuckDB + PG portable</text>

  <!-- daily_deals (new) -->
  <rect x="448" y="258" width="172" height="72" rx="8" fill="#1f1000" stroke="#7a4a1e" stroke-width="2"/>
  <text x="534" y="279" text-anchor="middle" fill="#ffa657" font-size="10" font-weight="700">daily_deals  ✨ new</text>
  <text x="534" y="295" text-anchor="middle" fill="#7d8590" font-size="8.5">table · date grain</text>
  <text x="534" y="309" text-anchor="middle" fill="#6e7681" font-size="8">≥30% off + ≥50 reviews</text>
  <text x="534" y="323" text-anchor="middle" fill="#6e7681" font-size="8">deal_rank · is_fresh_drop</text>

  <!-- price_history feeds price_movers -->
  <path d="M620,118 C650,118 665,168 640,176" stroke="#f0883e" stroke-width="1" fill="none" marker-end="url(#arr3)" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- price_history also feeds daily_deals -->
  <path d="M620,118 C680,118 700,285 640,285" stroke="#ffa657" stroke-width="1" fill="none" marker-end="url(#arr3)" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- ref() labels -->
  <text x="430" y="106" fill="#6e7681" font-size="8" text-anchor="middle">ref()</text>
  <text x="430" y="164" fill="#6e7681" font-size="8" text-anchor="middle">ref()</text>
  <text x="430" y="222" fill="#6e7681" font-size="8" text-anchor="middle">ref()</text>
  <text x="430" y="280" fill="#ffa657" font-size="8" text-anchor="middle">ref() ✨</text>

  <!-- Macro callout -->
  <rect x="648" y="230" width="190" height="52" rx="6" fill="#0d1117" stroke="#5c3a1e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="743" y="248" text-anchor="middle" fill="#f0883e" font-size="9" font-weight="600">macros/median.sql</text>
  <text x="743" y="262" text-anchor="middle" fill="#7d8590" font-size="8">DuckDB → median(col)</text>
  <text x="743" y="275" text-anchor="middle" fill="#7d8590" font-size="8">PostgreSQL → PERCENTILE_CONT</text>
  <path d="M648,255 C636,255 630,250 620,250" stroke="#f0883e" stroke-width="1" fill="none" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Legend -->
  <line x1="40" y1="315" x2="820" y2="315" stroke="#21262d" stroke-width="1"/>
  <line x1="56" y1="328" x2="76" y2="328" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="82" y="332" fill="#7d8590" font-size="9">source() ref</text>
  <line x1="170" y1="328" x2="190" y2="328" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="196" y="332" fill="#7d8590" font-size="9">ref() dependency</text>
  <line x1="320" y1="328" x2="340" y2="328" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr3)"/>
  <text x="346" y="332" fill="#ffa657" font-size="9">new in v0.2.0</text>
  <rect x="460" y="322" width="8" height="8" rx="1" fill="#1f1000" stroke="#7a4a1e" stroke-width="1.5"/>
  <text x="474" y="332" fill="#ffa657" font-size="9">daily_deals</text>
</svg>
