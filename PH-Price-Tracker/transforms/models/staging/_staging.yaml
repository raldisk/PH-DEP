version: 2

models:
  - name: stg_prices
    description: >
      Cleaned and lightly transformed view over raw.price_snapshots.
      Applies null filtering, string trimming, and derives price_tier classification.
    columns:
      - name: item_id
        description: "Lazada item identifier."
        tests:
          - not_null
      - name: product_name
        description: "Trimmed product display name."
        tests:
          - not_null
      - name: current_price
        description: "Sale price in PHP. Always > 0 after staging filter."
        tests:
          - not_null
      - name: discount_pct
        description: "Discount percentage, defaulting to 0 when not on sale."
        tests:
          - not_null
      - name: price_tier
        description: "Bucketed discount label: full_price | minor_discount | on_sale | deep_discount."
        tests:
          - not_null
          - accepted_values:
              values: ["full_price", "minor_discount", "on_sale", "deep_discount"]
      - name: keyword
        description: "Lowercased search keyword."
        tests:
          - not_null
      - name: scraped_at
        description: "UTC timestamp."
        tests:
          - not_null
