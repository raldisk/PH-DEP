version: 2

models:
  - name: stg_tweet_events
    description: "Cleaned, deduplicated tweet events with Manila timezone normalization"
    columns:
      - name: tweet_id
        tests: [not_null, unique]
      - name: created_at_utc
        tests: [not_null]
      - name: text
        tests: [not_null]
      - name: sentiment_label
        tests:
          - accepted_values:
              values: ['positive', 'neutral', 'negative']
              config:
                where: "sentiment_label IS NOT NULL"
