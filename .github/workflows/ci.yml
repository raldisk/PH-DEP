name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & type-check ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy type check
        run: uv run mypy src/

  # ── Job 2: Test — DuckDB backend (no service needed) ─────────────────────
  test-duckdb:
    name: Test — DuckDB backend
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv sync --extra dev

      - name: Run DuckDB tests
        run: |
          uv run pytest tests/ \
            -v \
            -m "not postgres" \
            --cov=price_tracker \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Job 3: Test — PostgreSQL backend (service container) ─────────────────
  test-postgres:
    name: Test — PostgreSQL backend
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: tracker
          POSTGRES_DB: tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv sync --extra dev

      - name: Run PostgreSQL integration tests
        env:
          TRACKER_POSTGRES_DSN: postgresql://tracker:tracker@localhost:5432/tracker
        run: |
          uv run pytest tests/ \
            -v \
            -m postgres \
            --no-cov

  # ── Job 4: dbt parse & compile (validates SQL + YAML) ────────────────────
  dbt-validate:
    name: dbt Parse & Validate
    runs-on: ubuntu-latest
    needs: [test-duckdb, test-postgres]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv sync --extra dev

      - name: dbt parse
        working-directory: transforms
        env:
          TRACKER_DB_PATH: ":memory:"
        run: |
          uv run dbt parse \
            --profiles-dir . \
            --project-dir . \
            --target ci

      - name: dbt compile
        working-directory: transforms
        env:
          TRACKER_DB_PATH: ":memory:"
        run: |
          uv run dbt compile \
            --profiles-dir . \
            --project-dir . \
            --target ci
