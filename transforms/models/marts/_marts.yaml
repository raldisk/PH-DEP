version: 2

models:
  - name: price_history
    description: "Full price history per item with period-over-period change metrics."
    columns:
      - name: item_id
        tests: [not_null]
      - name: current_price
        tests: [not_null]
      - name: price_direction
        tests:
          - accepted_values:
              values: ["decreased", "increased", "unchanged", "first_seen"]
      - name: snapshot_date
        tests: [not_null]

  - name: price_movers
    description: "Top 20 price drops and spikes per day, ranked by absolute change."
    columns:
      - name: item_id
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]
      - name: price_direction
        tests:
          - accepted_values:
              values: ["decreased", "increased"]

  - name: category_summary
    description: "Aggregated category price statistics per snapshot date."
    columns:
      - name: snapshot_date
        tests: [not_null]
      - name: category
        tests: [not_null]
      - name: unique_items
        tests: [not_null]

  - name: daily_deals
    description: >
      Top 10 deals per day — items with ≥30% discount and ≥50 reviews,
      ranked by discount depth. Flags 'fresh drop' items that entered
      qualifying range on a given day.
    columns:
      - name: snapshot_date
        tests: [not_null]
      - name: deal_rank
        description: "1-10 rank within each day. 1 = deepest discount."
        tests: [not_null]
      - name: item_id
        tests: [not_null]
      - name: discount_pct
        tests: [not_null]
      - name: price_tier
        tests:
          - accepted_values:
              values: ["full_price", "minor_discount", "on_sale", "deep_discount"]
      - name: is_fresh_drop
        description: "True if the item dropped ≥10% in price today."
        tests: [not_null]
